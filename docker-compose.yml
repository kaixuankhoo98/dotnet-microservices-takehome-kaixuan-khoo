# Local dev: infra + Order + Payment + Notification APIs (HTTP 8080 in container).
# Scalar UI: http://localhost:5211/scalar/v1 (Order), http://localhost:5104/scalar/v1 (Payment), http://localhost:5030/scalar/v1 (Notification) — paths may match your Scalar package version.
# Seq UI: http://localhost:8081  |  RabbitMQ management: http://localhost:15672 (guest/guest)
#
# From repo root:
#   docker compose up --build
#
# Connection strings below use Docker service names (sqlserver, rabbitmq, seq), not localhost.

services:
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - sqlserver_data:/var/lib/mssql/data

  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "AdminPassword1!"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: src/OrderService/OrderService.API/Dockerfile
    container_name: order-service
    ports:
      - "5211:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyEfMigrations: "true"
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Seq__ServerUrl: http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: src/PaymentService/PaymentService.API/Dockerfile
    container_name: payment-service
    ports:
      - "5104:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyEfMigrations: "true"
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PaymentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Seq__ServerUrl: http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: src/NotificationService/NotificationService.API/Dockerfile
    container_name: notification-service
    ports:
      - "5030:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ApplyEfMigrations: "true"
      DisableHttpsRedirection: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=NotificationDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: guest
      RabbitMq__Password: guest
      Seq__ServerUrl: http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    container_name: api-gateway
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      DisableHttpsRedirection: "true"
      Seq__ServerUrl: http://seq:80
    depends_on:
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started

volumes:
  rabbitmq_data:
  sqlserver_data:
